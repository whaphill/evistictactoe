<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Validation Test</title>
</head>
<body>
  <h1>HTML Validation Test</h1>
  <div id="output">
    Testing if main index.html can be loaded and parsed...
  </div>
  <iframe id="test-frame" src="index.html" style="width:100%; height:500px; border:1px solid #ccc;"></iframe>
  <script>
    const frame = document.getElementById('test-frame');
    frame.onload = () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const title = doc.title || 'No title found';
        document.getElementById('output').innerHTML =
          `<p style="color: green;">Success! Loaded index.html with title: "${title}"</p>`;

        // Test if we can access some global variables
        try {
          const winScore = frame.contentWindow.WIN_SCORE;
          document.getElementById('output').innerHTML +=
            `<p>WIN_SCORE: ${winScore !== undefined ? winScore : 'NOT ACCESSIBLE'}</p>`;
        } catch(e) {
          document.getElementById('output').innerHTML +=
            `<p>Cannot access WIN_SCORE (expected due to iframe security): ${e.message}</p>`;
        }
      } catch(e) {
        document.getElementById('output').innerHTML =
          `<p style="color: red;">Error accessing iframe content: ${e.message}</p>`;
      }
    };

    frame.onerror = () => {
      document.getElementById('output').innerHTML =
        `<p style="color: red;">Error loading index.html in iframe</p>`;
    };
  </script>
</body>
</html>
