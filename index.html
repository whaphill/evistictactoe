<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eviTicTacToe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="evi's TicTacToe">
  <meta name="description" content="3목 틱택토 - 10점 먼저 이기는 사람이 승리">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230a0a0f' width='180' height='180' rx='40'/><text x='50%25' y='45%25' font-size='90' text-anchor='middle' dominant-baseline='central' fill='%23ff6b9d'>O</text><text x='70%25' y='70%25' font-size='60' text-anchor='middle' dominant-baseline='central' fill='%234ecdc4'>X</text></svg>">
  <title>evi's TicTacToe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <!-- QR Code Generator -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <!-- QR Code Scanner -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse at 20% 80%, rgba(78, 205, 196, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 107, 157, 0.03) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      color: #e0e0e0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      gap: 1.2rem;
      overflow-x: hidden;
    }

    /* ─── MAIN SCREEN ─── */
    #main-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      z-index: 200;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #main-screen.hidden {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none;
    }

    .main-title {
      text-align: center;
      animation: titleFloat 3s ease-in-out infinite;
    }
    .main-title .title-oxy {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(3rem, 15vw, 6rem);
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .main-title .title-ox { color: #ff6b9d; text-shadow: 0 0 30px rgba(255,107,157,0.5); }
    .main-title .title-xs { color: #4ecdc4; text-shadow: 0 0 30px rgba(78,205,196,0.5); }
    .main-title .title-tac {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      background: linear-gradient(135deg, #ff6b9d, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.3em;
      margin-top: 0.5rem;
    }
    .main-title .title-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.8rem;
      letter-spacing: 0.1em;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .main-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: min(80vw, 280px);
    }

    /* Multiplayer Setup Screen */
    #multiplayer-setup {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 200;
      transition: opacity 0.4s ease, transform 0.4s ease;
      padding: 2rem;
      text-align: center;
    }
    #multiplayer-setup.hidden {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none;
    }

    #multiplayer-setup h2 {
      color: #ffd700;
      margin-bottom: 1rem;
    }

    #qr-code-display {
      background: #12121a;
      border-radius: 12px;
      padding: 1rem;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qr-code-display img {
      max-width: 100%;
      max-height: 100%;
    }

    #scan-area {
      width: 100%;
      max-width: 300px;
      height: 200px;
      background: #12121a;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    #video-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #scan-instructions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: #e0e0e0;
      padding: 0.5rem;
      font-size: 0.9rem;
    }

    .setup-button {
      background: transparent;
      color: #e0e0e0;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 0.5rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .setup-button:hover {
      color: #ffd700;
      border-color: #5a5a7a;
      transform: scale(1.05);
    }

    .setup-button:active {
      transform: scale(0.97);
    }

    #connection-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      min-height: 1.5rem;
    }
  </style>
  <body>
    <header>
      <h1>evi's TicTacToe</h1>
      <p class="subtitle">3목 틱택토 &middot; 10점 먼저 이기는 사람이 승리</p>
    </header>

    <div id="scoreboard">
      <div class="score-block">
        <div class="mark o">O</div>
        <div class="pts" id="score-o">0</div>
      </div>
      <div class="score-vs">:</div>
      <div class="score-block">
        <div class="mark x">X</div>
        <div class="pts" id="score-x">0</div>
      </div>
    </div>

    <div id="turn-indicator">
      <span class="turn-o">Player O</span>의 턴
    </div>

    <div id="board-wrapper">
      <div id="board"></div>
      <svg id="triple-lines"></svg>
    </div>

    <div id="message"></div>

    <button id="restart-btn">다시 시작</button>

    <div id="win-overlay">
      <div class="win-text" id="win-text"></div>
      <button id="overlay-restart-btn">한 판 더</button>
    </div>

    <!-- Multiplayer Setup UI -->
    <div id="multiplayer-setup" class="hidden">
      <h2>멀티플레이 설정</h2>
      <div id="connection-status">연결 대기 중...</div>

      <!-- Offer/Answer Display -->
      <div id="qr-code-display">
        <!-- QR code will be inserted here -->
      </div>

      <!-- Scan Area -->
      <div id="scan-area" class="hidden">
        <video id="video-preview" playsinline></video>
        <div id="scan-instructions">상대방의 QR 코드를 스캔하세요</div>
      </div>

      <div class="setup-button" id="btn-regenerate-qr">QR 코드 새로 생성</div>
      <div class="setup-button" id="btn-switch-role">역할 전환</div>
    </div>

  </body>
  <script>
    // ── MULTIPLAYER STATE ────────────────────────────────────────
    let pc = null; // RTCPeerConnection
    let dataChannel = null;
    let isOfferer = false;
    let myTurn = false;
    let lastSentMove = null;
    const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

    // Multiplayer UI elements
    const multiplayerSetup = document.getElementById('multiplayer-setup');
    const connectionStatus = document.getElementById('connection-status');
    const qrCodeDisplay = document.getElementById('qr-code-display');
    const scanArea = document.getElementById('scan-area');
    const videoPreview = document.getElementById('video-preview');
    const scanInstructions = document.getElementById('scan-instructions');
    const btnRegenerateQR = document.getElementById('btn-regenerate-qr');
    const btnSwitchRole = document.getElementById('btn-switch-role');

    // QR code scanner
    let html5QrcodeScanner = null;

    // ── MAIN SCREEN BUTTON HANDLERS ────────────────────────────
    // Replace the INVITE button handler to start multiplayer
    document.querySelector('.main-buttons').addEventListener('click', (e) => {
      if (e.target.textContent.includes('대전') || e.target.textContent.includes('INVITE')) {
        startMultiplayerAsOfferer();
      }
    });

    // ── MULTIPLAYER UI HANDLERS ────────────────────────────────
    btnRegenerateQR.addEventListener('click', () => {
      if (isOfferer) {
        createOffer();
      } else {
        createAnswer();
      }
    });

    btnSwitchRole.addEventListener('click', () => {
      isOfferer = !isOfferer;
      updateUIForRole();
      if (pc && dataChannel && dataChannel.readyState === 'open') {
        // If already connected, just switch role label
        return;
      }
      // Reset connection and start fresh
      cleanupPeerConnection();
      if (isOfferer) {
        createOffer();
      } else {
        // Create dummy offer to trigger answer generation
        createOffer();
      }
    });

    // ── MULTIPLAYER FUNCTIONS ───────────────────────────────────
    function startMultiplayerAsOfferer() {
      isOfferer = true;
      showMultiplayerSetup();
      updateUIForRole();
      createOffer();
    }

    function showMultiplayerSetup() {
      document.getElementById('main-screen').classList.add('hidden');
      multiplayerSetup.classList.remove('hidden');
    }

    function hideMultiplayerSetup() {
      multiplayerSetup.classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
    }

    function updateUIForRole() {
      if (isOfferer) {
        multiplayerSetup.querySelector('h2').textContent = '초대 코드 생성 중';
        connectionStatus.textContent = '연결을 기다리는 중...';
        btnRegenerateQR.textContent = '초대 코드 새로 생성';
        btnSwitchRole.textContent = '참가자로 전환';
      } else {
        multiplayerSetup.querySelector('h2').textContent = '참가 코드 생성 중';
        connectionStatus.textContent = '초대 코드를 스캔하세요';
        btnRegenerateQR.textContent = '참가 코드 새로 생성';
        btnSwitchRole.textContent = '초대자로 전환';
      }

      // Toggle QR display and scan area
      if (isOfferer) {
        qrCodeDisplay.classList.remove('hidden');
        scanArea.classList.add('hidden');
        stopQRScanner();
      } else {
        qrCodeDisplay.classList.add('hidden');
        scanArea.classList.remove('hidden');
        startQRScanner();
      }
    }

    function createOffer() {
      if (!isOfferer) return;

      connectionStatus.textContent = '연결 생성 중...';

      // Cleanup existing connection
      cleanupPeerConnection();

      // Create peer connection
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });

      // Create data channel
      dataChannel = pc.createDataChannel('game');
      setupDataChannel();

      // Handle ICE candidates
      pc.onicecandidate = (event) => {
        if (event.candidate) {
          console.log('New ICE candidate:', event.candidate);
          // Candidates will be sent with offer/answer
        }
      };

      // Handle connection state changes
      pc.onconnectionstatechange = (event) => {
        console.log('Connection state:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          connectionStatus.textContent = '연결됨! 게임을 시작합니다.';
          myTurn = true; // Offerer goes first
          updateTurnIndicator();
        } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
          connectionStatus.textContent = '연결 오류. 다시 시도해주세요.';
        }
      };

      // Handle signaling state changes
      pc.onsignalingstatechange = (event) => {
        console.log('Signaling state:', pc.signalingState);
      };

      // Handle ICE gathering state
      pc.onicegatheringstatechange = (event) => {
        console.log('ICE gathering state:', pc.iceGatheringState);
        if (pc.iceGatheringState === 'complete') {
          // Gather all candidates and create offer
          setTimeout(() => {
            pc.createOffer()
              .then(offer => {
                return pc.setLocalDescription(offer);
              })
              .then(() => {
                // Wait a bit more for ICE candidates, then send offer
                setTimeout(() => {
                  const offerData = {
                    type: 'offer',
                    sdp: pc.localDescription.sdp,
                    candidates: pc.localDescription ? [] : [] // Simplified for now
                  };
                  sendSignalingMessage(offerData);
                }, 1000);
              })
              .catch(handleError);
          }, 500);
        }
      };
    }

    function createAnswer() {
      if (isOfferer) return;

      connectionStatus.textContent = '답변 생성 중...';

      // Cleanup existing connection
      cleanupPeerConnection();

      // Create peer connection
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });

      // Handle incoming data channel
      pc.ondatachannel = (event) => {
        dataChannel = event.channel;
        setupDataChannel();
      };

      // Handle ICE candidates
      pc.onicecandidate = (event) => {
        if (event.candidate) {
          console.log('New ICE candidate:', event.candidate);
        }
      };

      // Handle connection state changes
      pc.onconnectionstatechange = (event) => {
        console.log('Connection state:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          connectionStatus.textContent = '연결됨! 게임을 시작합니다.';
          myTurn = false; // Answerer goes second
          updateTurnIndicator();
        } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
          connectionStatus.textContent = '연결 오류. 다시 시도해주세요.';
        }
      };

      // Handle ICE gathering state
      pc.onicegatheringstatechange = (event) => {
        console.log('ICE gathering state:', pc.iceGatheringState);
        if (pc.iceGatheringState === 'complete') {
          // Create answer
          setTimeout(() => {
            pc.createAnswer()
              .then(answer => {
                return pc.setLocalDescription(answer);
              })
              .then(() => {
                setTimeout(() => {
                  const answerData = {
                    type: 'answer',
                    sdp: pc.localDescription.sdp,
                    candidates: []
                  };
                  sendSignalingMessage(answerData);
                }, 1000);
              })
              .catch(handleError);
          }, 500);
        }
      };
    }

    function setupDataChannel() {
      dataChannel.onopen = () => {
        console.log('Data channel opened');
        connectionStatus.textContent = '데이터 채널 준비됨';
      };

      dataChannel.onclose = () => {
        console.log('Data channel closed');
        connectionStatus.textContent = '데이터 채널이 닫혔습니다.';
      };

      dataChannel.onerror = (error) => {
        console.error('Data channel error:', error);
        connectionStatus.textContent = '데이터 채널 오류가 발생했습니다.';
      };

      dataChannel.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          handleDataChannelMessage(message);
        } catch (error) {
          console.error('Error parsing message:', error);
        }
      };
    }

    function handleDataChannelMessage(message) {
      switch (message.type) {
        case 'move':
          handleRemoteMove(message.row, message.col);
          break;
        case 'reset':
          handleRemoteReset();
          break;
        case 'turn':
          // Optional explicit turn signaling
          break;
      }
    }

    function handleRemoteMove(row, col) {
      // Check if this is our own echoed move
      if (lastSentMove && lastSentMove.row === row && lastSentMove.col === col) {
        lastSentMove = null; // Clear the echo
        return;
      }

      // Apply opponent's move
      isRemoteMove = true;
      try {
        placeMark(row, col);
      } finally {
        isRemoteMove = false;
      }

      // Toggle turn
      myTurn = true;
      updateTurnIndicator();
    }

    function handleRemoteReset() {
      init(); // Reset local game state
      myTurn = false; // Wait for opponent to start
      updateTurnIndicator();
      connectionStatus.textContent = '상대방이 게임을 재설정했습니다.';
    }

    function sendMove(row, col) {
      if (!dataChannel || dataChannel.readyState !== 'open') {
        console.error('Data channel not ready');
        return;
      }

      const moveData = {
        type: 'move',
        row: row,
        col: col
      };

      // Store for echo detection
      lastSentMove = { row: row, col: col };

      // Send via data channel
      dataChannel.send(JSON.stringify(moveData));

      // Apply move locally (optimistic update)
      placeMark(row, col);

      // Toggle turn (we'll toggle back when we receive the echo or opponent's move)
      myTurn = false;
      updateTurnIndicator();
    }

    function sendReset() {
      if (!dataChannel || dataChannel.readyState !== 'open') {
        console.error('Data channel not ready');
        return;
      }

      const resetData = {
        type: 'reset'
      };

      dataChannel.send(JSON.stringify(resetData));
      init(); // Reset local state
      myTurn = false;
      updateTurnIndicator();
    }

    function sendSignalingMessage(message) {
      // Convert message to JSON and then to QR code
      const messageJson = JSON.stringify(message);
      console.log('Sending signaling message:', messageJson);

      // Generate QR code
      qrCodeDisplay.innerHTML = ''; // Clear previous QR
      new QRCode(qrCodeDisplay, {
        text: messageJson,
        width: 180,
        height: 180,
        colorDark: "#ffd700",
        colorLight: "#12121a",
        correctLevel: QRCode.CorrectLevel.H
      });

      connectionStatus.textContent = isOfferer ?
        '상대방이 이 QR 코드를 스캔하세요' :
        '생성된 코드를 상대방에게 보여주세요';
    }

    function startQRScanner() {
      // Stop any existing scanner
      stopQRScanner();

      // Configure QR code scanner
      html5QrcodeScanner = new Html5Qrcode("video-preview");
      const qrCodeSuccessCallback = (decodedText, decodedResult) => {
        console.log('QR code scanned:', decodedText);

        try {
          const message = JSON.parse(decodedText);
          handleSignalingMessageReceived(message);
        } catch (error) {
          console.error('Error parsing scanned QR code:', error);
          connectionStatus.textContent = '잘못된 QR 코드입니다. 다시 시도해주세요.';
        }

        // Stop scanning after successful read
        stopQRScanner();
      };

      const config = { fps: 10, qrbox: 250 };

      html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        qrCodeSuccessCallback,
        (errorMessage) => {
          // Ignore scanning errors, continue trying
          console.log(`QR scanning error: ${errorMessage}`);
        }
      ).catch((err) => {
        console.error('Unable to start QR scanning:', err);
        connectionStatus.textContent = '카메라 접근에 실패했습니다. 권한을 확인해주세요.';
      });
    }

    function stopQRScanner() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().catch((ignore) => {});
        html5QrcodeScanner = null;
      }
    }

    function handleSignalingMessageReceived(message) {
      console.log('Received signaling message:', message);

      switch (message.type) {
        case 'offer':
          handleOffer(message);
          break;
        case 'answer':
          handleAnswer(message);
          break;
        default:
          console.warn('Unknown signaling message type:', message.type);
      }
    }

    function handleOffer(offerData) {
      if (isOfferer) {
        // We're the offerer receiving an answer
        handleAnswer(offerData);
        return;
      }

      // We're the answerer receiving an offer
      connectionStatus.textContent = '초대 코드를 처리 중...';

      cleanupPeerConnection();
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });

      pc.ondatachannel = (event) => {
        dataChannel = event.channel;
        setupDataChannel();
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          console.log('New ICE candidate:', event.candidate);
        }
      };

      pc.onconnectionstatechange = (event) => {
        console.log('Connection state:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          connectionStatus.textContent = '연결됨! 게임을 시작합니다.';
          myTurn = false; // Answerer goes second
          updateTurnIndicator();
        } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
          connectionStatus.textContent = '연결 오류. 다시 시도해주세요.';
        }
      };

      pc.onicegatheringstatechange = (event) => {
        if (pc.iceGatheringState === 'complete') {
          // Set remote description and create answer
          pc.setRemoteDescription(new RTCSessionDescription(offerData))
            .then(() => {
              return pc.createAnswer();
            })
            .then(answer => {
              return pc.setLocalDescription(answer);
            })
            .then(() => {
              setTimeout(() => {
                const answerData = {
                  type: 'answer',
                  sdp: pc.localDescription.sdp,
                  candidates: []
                };
                sendSignalingMessage(answerData);
              }, 1000);
            })
            .catch(handleError);
        }
      };
    }

    function handleAnswer(answerData) {
      if (!isOfferer) {
        // We're the answerer receiving an offer (shouldn't happen in normal flow)
        handleOffer(answerData);
        return;
      }

      // We're the offerer receiving an answer
      connectionStatus.textContent = '답변을 처리 중...';

      pc.setRemoteDescription(new RTCSessionDescription(answerData))
        .then(() => {
          connectionStatus.textContent = '연결이 설정되었습니다.';
        })
        .catch(handleError);
    }

    function handleError(error) {
      console.error('WebRTC error:', error);
      connectionStatus.textContent = '오류가 발생했습니다: ' + error.message;
    }

    function cleanupPeerConnection() {
      stopQRScanner();

      if (dataChannel) {
        dataChannel.close();
        dataChannel = null;
      }

      if (pc) {
        pc.close();
        pc = null;
      }
    }

    function updateTurnIndicator() {
      const turnEl = document.getElementById('turn-indicator');
      if (!turnEl) return;

      if (status === 'GAME_OVER') {
        turnEl.innerHTML = '';
        return;
      }

      if (myTurn) {
        turnEl.innerHTML = `<span class="turn-${current.toLowerCase()}">Player ${current}</span>의 턴`;
      } else {
        turnEl.innerHTML = `<span class="turn-${current === 'O' ? 'x' : 'o'}">상대방</span>의 턴`;
      }
    }

    // ── OVERRIDE EXISTING FUNCTIONS FOR MULTIPLAYER ─────────────
    // Override placeMark to handle multiplayer
    const originalPlaceMark = placeMark;
    function placeMark(r, c) {
      // In multiplayer mode, we only place marks when it's our turn
      // or when receiving a move from opponent
      if (isMultiplayerMode() && !myTurn && !isRemoteMove) {
        // Not our turn and not processing remote move - ignore
        return;
      }

      // Call original placeMark
      originalPlaceMark(r, c);
    }

    // We need to track if we're processing a remote move to avoid double-processing
    let isRemoteMove = false;

    // Override the original placeMark to add multiplayer awareness
    // Actually, let's modify the existing placeMark function directly in the script
    // Instead of overriding, we'll modify the click handler

    // ── INITIALIZATION ────────────────────────────────────────
    // Replace the existing init function to handle multiplayer reset
    const originalInit = init;
    function init() {
      originalInit();
      // Reset multiplayer state when game is reset
      myTurn = false;
      lastSentMove = null;
      updateTurnIndicator();
    }

    // Override the click handler for multiplayer
    const originalHandleClick = handleClick;
    function handleClick(r, c) {
      if (isMultiplayerMode()) {
        // In multiplayer mode, only allow clicks when it's our turn
        if (!myTurn) {
          return;
        }

        // Check if cell is empty
        if (board[r][c].value !== null) {
          const idx = r * BOARD_SIZE + c;
          const cell = boardEl.children[idx];
          cell.classList.remove('shake');
          void cell.offsetWidth;
          cell.classList.add('shake');
          setTimeout(() => cell.classList.remove('shake'), 250);
          return;
        }

        // Send move to opponent
        sendMove(r, c);
        return;
      }

      // Single player mode - use original handler
      originalHandleClick(r, c);
    }

    // Helper functions
    function isMultiplayerMode() {
      return pc !== null && dataChannel !== null;
    }

    // Replace functions in the global scope
    window.placeMark = placeMark;
    window.handleClick = handleClick;
    window.init = init;

    // Replace the INVITE button text
    document.addEventListener('DOMContentLoaded', () => {
      const buttons = document.querySelectorAll('.main-buttons div');
      buttons.forEach(button => {
        if (button.textContent.trim() === '대전' || button.textContent.trim() === 'INVITE') {
          button.textContent = '멀티플레이';
        }
      });
    });

    // ── BOOT ─────────────────────────────────────────────
    init();
  </script>
