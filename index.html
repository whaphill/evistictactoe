<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="eviTicTacToe">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="evi's TicTacToe">
<meta name="description" content="3목 틱택토 - 10점 먼저 이기는 사람이 승리">
<link rel="manifest" href="/evistictactoe/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230a0a0f' width='180' height='180' rx='40'/><text x='50%25' y='45%25' font-size='90' text-anchor='middle' dominant-baseline='central' fill='%23ff6b9d'>O</text><text x='70%25' y='70%25' font-size='60' text-anchor='middle' dominant-baseline='central' fill='%234ecdc4'>X</text></svg>">
<title>evi's TicTacToe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: #0a0a0f;
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(78, 205, 196, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255, 107, 157, 0.03) 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e0e0e0;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
  gap: 1.2rem;
  overflow-x: hidden;
}

/* ─── MAIN SCREEN ─── */
#main-screen {
  position: fixed;
  inset: 0;
  background: #0a0a0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3rem;
  z-index: 200;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#main-screen.hidden {
  opacity: 0;
  transform: scale(1.1);
  pointer-events: none;
}

.main-title {
  text-align: center;
  animation: titleFloat 3s ease-in-out infinite;
}
.main-title .title-oxy {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(3rem, 15vw, 6rem);
  font-weight: 700;
  letter-spacing: 0.05em;
}
.main-title .title-ox { color: #ff6b9d; text-shadow: 0 0 30px rgba(255,107,157,0.5); }
.main-title .title-xs { color: #4ecdc4; text-shadow: 0 0 30px rgba(78,205,196,0.5); }
.main-title .title-tac {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.5rem, 6vw, 2.5rem);
  background: linear-gradient(135deg, #ff6b9d, #4ecdc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.3em;
  margin-top: 0.5rem;
}
.main-title .title-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: #555;
  margin-top: 0.8rem;
  letter-spacing: 0.1em;
}

@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.main-buttons {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: min(80vw, 280px);
}
.main-btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  padding: 1rem 2rem;
  border-radius: 12px;
  border: 2px solid;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.1em;
  position: relative;
  overflow: hidden;
}
.main-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.main-btn:active {
  transform: scale(0.97);
}

.main-btn.play {
  border-color: #ffd700;
  color: #ffd700;
}
.main-btn.play::before {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
}
.main-btn.play:hover::before, .main-btn.play:active::before { opacity: 1; }
.main-btn.play:hover { box-shadow: 0 0 20px rgba(255,215,0,0.3); }

.main-btn.invite {
  border-color: #9b59b6;
  color: #9b59b6;
}
.main-btn.invite::before {
  background: linear-gradient(135deg, rgba(155,89,182,0.15), rgba(155,89,182,0.05));
}
.main-btn.invite:hover::before, .main-btn.invite:active::before { opacity: 1; }
.main-btn.invite:hover { box-shadow: 0 0 20px rgba(155,89,182,0.3); }

.main-btn.shop {
  border-color: #3498db;
  color: #3498db;
}
.main-btn.shop::before {
  background: linear-gradient(135deg, rgba(52,152,219,0.15), rgba(52,152,219,0.05));
}
.main-btn.shop:hover::before, .main-btn.shop:active::before { opacity: 1; }
.main-btn.shop:hover { box-shadow: 0 0 20px rgba(52,152,219,0.3); }

.main-btn.multiplayer {
  border-color: #2ecc71;
  color: #2ecc71;
}
.main-btn.multiplayer::before {
  background: linear-gradient(135deg, rgba(46,204,113,0.15), rgba(46,204,113,0.05));
}
.main-btn.multiplayer:hover::before, .main-btn.multiplayer:active::before { opacity: 1; }
.main-btn.multiplayer:hover { box-shadow: 0 0 20px rgba(46,204,113,0.3); }

#restart-row {
  display: flex;
  gap: 0.8rem;
  width: min(92vw, 480px);
  justify-content: flex-end;
}
.small-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  padding: 0.45rem 1rem;
  background: transparent;
  color: #555;
  border: 1px solid #2a2a3a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s ease;
}
.small-btn:hover {
  color: #e0e0e0;
  border-color: #5a5a7a;
}
.small-btn:active { transform: scale(0.97); }

/* ─── GAME SCREEN ─── */
#game-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  width: 100%;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#game-screen.visible {
  opacity: 1;
}

header {
  text-align: center;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #ff6b9d, #4ecdc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header .subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: #555;
  margin-top: 0.25rem;
  letter-spacing: 0.05em;
}

#scoreboard {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  background: #1a1a2e;
  border: 1px solid #2a2a3a;
  border-radius: 12px;
  padding: 0.8rem 1.5rem;
}
.score-block {
  text-align: center;
  min-width: 4rem;
}
.score-block .mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem;
  font-weight: 700;
}
.score-block .mark.o { color: #ff6b9d; }
.score-block .mark.x { color: #4ecdc4; }
.score-block .pts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255,215,0,0.4);
  transition: transform 0.15s ease;
}
.score-block .pts.bump {
  transform: scale(1.4);
}
.score-vs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: #444;
}

#turn-indicator {
  font-size: 0.85rem;
  color: #666;
  text-align: center;
  height: 1.2em;
}
#turn-indicator .turn-o { color: #ff6b9d; }
#turn-indicator .turn-x { color: #4ecdc4; }

#board-wrapper {
  position: relative;
  width: min(92vw, 480px);
  height: min(92vw, 480px);
}

#board {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  grid-template-rows: repeat(9, 1fr);
  gap: 2px;
  background: #1c1c28;
  padding: 6px;
  border-radius: 10px;
  border: 1px solid #2a2a3a;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
  width: 100%;
  height: 100%;
}
.cell {
  background: #12121a;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 100%;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.12s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  aspect-ratio: 1 / 1;
}
.cell[data-col="2"] { border-right: 2px solid #3a3a4a; }
.cell[data-col="5"] { border-right: 2px solid #3a3a4a; }
.cell[data-row="2"] { border-bottom: 2px solid #3a3a4a; }
.cell[data-row="5"] { border-bottom: 2px solid #3a3a4a; }
.cell:first-child { border-top-left-radius: 6px; }
.cell:nth-child(9) { border-top-right-radius: 6px; }
.cell:nth-child(73) { border-bottom-left-radius: 6px; }
.cell:last-child { border-bottom-right-radius: 6px; }

.cell.O { color: #ff6b9d; text-shadow: 0 0 8px rgba(255,107,157,0.5); }
.cell.X { color: #4ecdc4; text-shadow: 0 0 8px rgba(78,205,196,0.5); }

.cell:not(.occupied):hover { background: #1e1e2e; }
.cell.occupied { cursor: not-allowed; }

.cell.triple-hit {
  animation: tripleGlow 0.6s ease-out;
}
@keyframes tripleGlow {
  0% { box-shadow: 0 0 0 0px rgba(255,215,0,0.8); }
  40% { box-shadow: 0 0 18px 4px rgba(255,215,0,0.8); }
  100% { box-shadow: 0 0 4px 0px rgba(255,215,0,0.3); }
}

.cell.pop {
  animation: popIn 0.2s ease-out;
}
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.cell.shake {
  animation: shakeAnim 0.2s ease;
}
@keyframes shakeAnim {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

#triple-lines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.triple-line {
  stroke-width: 1;
  stroke-linecap: round;
  fill: none;
  opacity: 0.85;
}
.triple-line.O {
  stroke: #ff6b9d;
}
.triple-line.X {
  stroke: #4ecdc4;
}
@keyframes lineAppear {
  0% { stroke-dashoffset: 500; }
  100% { stroke-dashoffset: 0; }
}
.triple-line.animate {
  stroke-dasharray: 500;
  animation: lineAppear 0.4s ease-out forwards;
}

#message {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1rem, 4vw, 1.4rem);
  font-weight: 700;
  height: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
#message.win-o { color: #ff6b9d; text-shadow: 0 0 16px rgba(255,107,157,0.7); }
#message.win-x { color: #4ecdc4; text-shadow: 0 0 16px rgba(78,205,196,0.7); }
#message.draw { color: #888; }

#restart-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  padding: 0.55rem 1.6rem;
  background: transparent;
  color: #666;
  border: 1px solid #2a2a3a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s ease;
}
#restart-btn:hover {
  color: #e0e0e0;
  border-color: #5a5a7a;
}
#restart-btn:active { transform: scale(0.97); }

#win-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  backdrop-filter: blur(4px);
  z-index: 100;
}
#win-overlay.show {
  opacity: 1;
  pointer-events: all;
}
#win-overlay .win-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 8vw, 3.5rem);
  animation: bounceIn 0.5s ease-out;
}
#win-overlay .win-text.o { color: #ff6b9d; text-shadow: 0 0 30px rgba(255,107,157,0.8); }
#win-overlay .win-text.x { color: #4ecdc4; text-shadow: 0 0 30px rgba(78,205,196,0.8); }
@keyframes bounceIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
#win-overlay button {
  font-family: 'JetBrains Mono', monospace;
  padding: 0.7rem 2rem;
  background: #1a1a2e;
  color: #ffd700;
  border: 1px solid #ffd700;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.05em;
}
#win-overlay button:hover {
  background: #ffd700;
  color: #0a0a0f;
  box-shadow: 0 0 20px rgba(255,215,0,0.4);
}
.overlay-btns {
  display: flex;
  gap: 1rem;
}
#overlay-main-btn {
  color: #888 !important;
  border-color: #555 !important;
}
#overlay-main-btn:hover {
  background: #2a2a3e !important;
  color: #e0e0e0 !important;
  box-shadow: none !important;
}

/* ─── MULTIPLAYER LOBBY ─── */
#mp-lobby {
  position: fixed;
  inset: 0;
  background: #0a0a0f;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  z-index: 300;
}
#mp-lobby.visible {
  display: flex;
}

.mp-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 6vw, 2.5rem);
  background: linear-gradient(135deg, #2ecc71, #4ecdc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.1em;
}

.mp-options {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}
.mp-card {
  width: min(45vw, 200px);
  padding: 2rem 1.5rem;
  background: #12121a;
  border: 1px solid #2a2a3a;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}
.mp-card:hover {
  border-color: #2ecc71;
  box-shadow: 0 0 24px rgba(46,204,113,0.15);
  transform: translateY(-4px);
}
.mp-card .mp-icon {
  font-size: 2.5rem;
  margin-bottom: 0.8rem;
}
.mp-card .mp-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  color: #e0e0e0;
  letter-spacing: 0.05em;
}
.mp-card .mp-desc {
  font-size: 0.75rem;
  color: #666;
  margin-top: 0.4rem;
}

.mp-panel {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
}
.mp-panel.visible {
  display: flex;
}

.mp-qr-box {
  width: 240px;
  height: 240px;
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mp-qr-box canvas {
  max-width: 100%;
  max-height: 100%;
  image-rendering: pixelated;
}

#mp-scan-area {
  width: min(80vw, 300px);
  aspect-ratio: 1;
  background: #12121a;
  border: 2px dashed #3a3a4a;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}
#mp-scan-area video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}
.mp-scan-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 0.8rem;
  color: #3a3a4a;
  font-size: 2rem;
}
.mp-scan-placeholder span {
  font-size: 0.8rem;
  color: #666;
}

.mp-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: #888;
  text-align: center;
  min-height: 1.4em;
}
.mp-status.connected { color: #2ecc71; }
.mp-status.error { color: #e74c3c; }

.mp-btn-group {
  display: flex;
  gap: 0.8rem;
  flex-wrap: wrap;
  justify-content: center;
}
.mp-back-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.06em;
  padding: 0.5rem 1.2rem;
  background: transparent;
  color: #555;
  border: 1px solid #2a2a3a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s ease;
}
.mp-back-btn:hover {
  color: #e0e0e0;
  border-color: #5a5a7a;
}

.mp-step-text {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.8rem;
  color: #888;
  text-align: center;
  line-height: 1.6;
}

.mp-code-section {
  width: 100%;
  max-width: 340px;
  margin: 0.6rem auto;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.mp-code-label {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.75rem;
  color: #888;
  text-align: center;
}
.mp-code-textarea {
  width: 100%;
  background: #12121a;
  color: #b0b0c0;
  border: 1px solid #2a2a3a;
  border-radius: 6px;
  padding: 0.6rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  line-height: 1.4;
  resize: vertical;
  word-break: break-all;
}
.mp-code-textarea:focus {
  outline: none;
  border-color: #ff6b9d;
}
.mp-copy-btn, .mp-apply-btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.75rem;
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
  letter-spacing: 0.04em;
}
.mp-copy-btn {
  background: #2a2a3a;
  color: #e0e0e0;
}
.mp-copy-btn:hover {
  background: #3a3a4a;
}
.mp-apply-btn {
  background: #ff6b9d;
  color: #fff;
}
.mp-apply-btn:hover {
  background: #ff8ab0;
}

/* ─── Server-based Multiplayer ─── */
.mp-room-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.4);
  text-align: center;
  padding: 0.8rem 0;
  background: #12121a;
  border-radius: 12px;
  border: 1px solid #2a2a3a;
  min-width: 200px;
}
.mp-code-input {
  width: 100%;
  max-width: 200px;
  background: #12121a;
  color: #ffd700;
  border: 2px solid #2a2a3a;
  border-radius: 8px;
  padding: 0.8rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-align: center;
  text-transform: uppercase;
  outline: none;
  transition: border-color 0.2s ease;
}
.mp-code-input:focus {
  border-color: #ffd700;
  box-shadow: 0 0 12px rgba(255,215,0,0.2);
}
.mp-code-input::placeholder {
  font-size: 0.9rem;
  color: #444;
  letter-spacing: 0.1em;
}
.mp-input-sm {
  font-size: 1.2rem !important;
  letter-spacing: 0.1em !important;
  max-width: 280px !important;
}

/* ─── Server Status ─── */
.mp-server-info {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: #555;
}
.mp-server-dot {
  font-size: 0.5rem;
  color: #e74c3c;
  transition: color 0.3s ease;
}
.mp-server-dot.connected {
  color: #2ecc71;
}
.mp-server-url {
  word-break: break-all;
}
.mp-server-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: #555;
}
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div class="main-title">
    <div class="title-oxy">
      <span class="title-ox">O</span><span class="title-xs">X</span>
    </div>
    <div class="title-tac">TICTACTOE</div>
    <div class="title-sub">3목 틱택토 · 10점 먼저 이기는 사람이 승리</div>
  </div>
  <div class="main-buttons">
    <button class="main-btn play" id="btn-play">PLAY</button>
    <button class="main-btn multiplayer" id="btn-multiplayer">MULTIPLAYER</button>
    <button class="main-btn invite" id="btn-invite">INVITE</button>
    <button class="main-btn shop" id="btn-shop">SHOP</button>
  </div>
</div>

<!-- MULTIPLAYER LOBBY -->
<div id="mp-lobby">
  <div class="mp-title">Multiplayer</div>

  <div class="mp-options" id="mp-mode-select">
    <div class="mp-card" id="mp-create">
      <div class="mp-icon">&#x1F451;</div>
      <div class="mp-label">Create Room</div>
      <div class="mp-desc">호스트가 되어 방을 만듭니다</div>
    </div>
    <div class="mp-card" id="mp-join">
      <div class="mp-icon">&#x1F517;</div>
      <div class="mp-label">Join Room</div>
      <div class="mp-desc">텍스트 코드로 참여합니다</div>
    </div>
  </div>

  <!-- SERVER INFO (shown in all modes) -->
  <div class="mp-server-info" id="mp-server-info" style="display:none;">
    <span class="mp-server-dot" id="mp-server-dot">&#9679;</span>
    <span class="mp-server-url" id="mp-server-url"></span>
  </div>

  <!-- HOST FLOW (Server-based) -->
  <div class="mp-panel" id="mp-host-panel">
    <div class="mp-status" id="mp-host-status">방 생성 중...</div>
    <div class="mp-step-text" id="mp-host-step">
      <span class="mp-server-label">서버: </span><span id="mp-host-url-display"></span>
    </div>
    <div class="mp-code-section" id="mp-host-code-section" style="display:none;">
      <label class="mp-code-label">▼ 상대방에게 공유할 방 코드입니다</label>
      <div class="mp-room-code" id="mp-host-code"></div>
      <button class="mp-copy-btn" id="mp-host-copy-btn">📋 복사</button>
    </div>
    <div class="mp-code-section" id="mp-host-retry-section" style="display:none;">
      <label class="mp-code-label">▼ 서버 주소 직접 입력</label>
      <input type="text" class="mp-code-input mp-input-sm" id="mp-host-manual-url" value="192.168.0.2:7680" autocomplete="off" />
      <button class="mp-apply-btn" id="mp-host-retry-btn">🔄 다시 연결</button>
    </div>
  </div>

  <!-- GUEST FLOW (Server-based) -->
  <div class="mp-panel" id="mp-guest-panel">
    <div class="mp-status" id="mp-guest-status">호스트의 방 코드를 입력하세요</div>
    <div class="mp-step-text" id="mp-guest-step">
      <span class="mp-server-label">서버: </span><span id="mp-guest-url-display"></span>
    </div>
    <div class="mp-code-section" id="mp-guest-code-section">
      <label class="mp-code-label">▼ 방 코드 입력 (4자리)</label>
      <input type="text" class="mp-code-input" id="mp-guest-code-input" maxlength="4" placeholder="EX: A3K9" autocomplete="off" />
      <button class="mp-apply-btn" id="mp-guest-join-btn">✅ 입장</button>
    </div>
    <div class="mp-code-section" id="mp-guest-retry-section" style="display:none;">
      <label class="mp-code-label">▼ 서버 주소 직접 입력</label>
      <input type="text" class="mp-code-input mp-input-sm" id="mp-guest-manual-url" value="192.168.0.2:7680" autocomplete="off" />
      <button class="mp-apply-btn" id="mp-guest-retry-btn">🔄 다시 연결</button>
    </div>
  </div>

  <div class="mp-btn-group">
    <button class="mp-back-btn" id="mp-back">&#x2190; 메인으로</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <header>
    <h1>evi's TicTacToe</h1>
    <p class="subtitle">3목 틱택토 &middot; 10점 먼저 이기는 사람이 승리</p>
  </header>

  <div id="scoreboard">
    <div class="score-block">
      <div class="mark o">O</div>
      <div class="pts" id="score-o">0</div>
    </div>
    <div class="score-vs">:</div>
    <div class="score-block">
      <div class="mark x">X</div>
      <div class="pts" id="score-x">0</div>
    </div>
  </div>

  <div id="turn-indicator">
    <span class="turn-o">Player O</span>의 턴
  </div>

  <div id="board-wrapper">
    <div id="board"></div>
    <svg id="triple-lines" style="position:absolute;top:6px;left:6px;width:calc(100% - 12px);height:calc(100% - 12px);overflow:visible;" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
  </div>

  <div id="message"></div>

  <div id="restart-row">
    <button id="restart-btn" class="small-btn">&#x27F5; 메인</button>
    <button id="restart-game-btn" class="small-btn">다시 시작</button>
  </div>
</div>

<div id="win-overlay">
  <div class="win-text" id="win-text"></div>
  <div class="overlay-btns">
    <button id="overlay-restart-btn">한 판 더</button>
    <button id="overlay-main-btn">메인으로</button>
  </div>
</div>


<script>
// ═══════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════
const WIN_SCORE = 10;
const BOARD_SIZE = 9;
const BOARD_PADDING = 6;
const CELL_GAP = 2;

const DIRS = [
  { dr: 0, dc: 1 },   // 0: horizontal →
  { dr: 1, dc: 0 },   // 1: vertical ↓
  { dr: 1, dc: 1 },   // 2: diagonal ↘
  { dr: 1, dc: -1 },  // 3: diagonal ↗
];

let board = [];
let scores = { O: 0, X: 0 };
let current = 'O';
let status = 'PLAYING';

// Multiplayer state (Server-based)
let gameMode = 'local';  // 'local' | 'host' | 'guest'
let myRole = null;        // 'O' (host) | 'X' (guest)
let isRemoteMove = false;
let wsConnection = null;
let mpRoomCode = null;
const SERVER_URL = `ws://${location.host || '127.0.0.1:7680'}`;

// ═══════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════
const mainScreen     = document.getElementById('main-screen');
const gameScreen     = document.getElementById('game-screen');
const btnPlay        = document.getElementById('btn-play');
const btnInvite      = document.getElementById('btn-invite');
const btnShop        = document.getElementById('btn-shop');
const btnMultiplayer = document.getElementById('btn-multiplayer');
const boardEl        = document.getElementById('board');
const msgEl          = document.getElementById('message');
const turnEl         = document.getElementById('turn-indicator');
const scoreOEl       = document.getElementById('score-o');
const scoreXEl       = document.getElementById('score-x');
const restartBtn     = document.getElementById('restart-btn');
const restartGameBtn = document.getElementById('restart-game-btn');
const overlayEl      = document.getElementById('win-overlay');
const winTextEl      = document.getElementById('win-text');
const overlayBtn     = document.getElementById('overlay-restart-btn');
const overlayMainBtn = document.getElementById('overlay-main-btn');
const linesSvg       = document.getElementById('triple-lines');

// MP DOM refs
const mpLobby          = document.getElementById('mp-lobby');
const mpModeSelect     = document.getElementById('mp-mode-select');
const mpHostPanel      = document.getElementById('mp-host-panel');
const mpGuestPanel     = document.getElementById('mp-guest-panel');
const mpBackBtn        = document.getElementById('mp-back');
const mpCreate         = document.getElementById('mp-create');
const mpJoin           = document.getElementById('mp-join');
const mpHostStatus     = document.getElementById('mp-host-status');
const mpGuestStatus    = document.getElementById('mp-guest-status');
const mpHostStep       = document.getElementById('mp-host-step');
const mpGuestStep      = document.getElementById('mp-guest-step');

// ═══════════════════════════════════════
//  SCREEN NAVIGATION
// ═══════════════════════════════════════
function showMainScreen() {
  gameScreen.classList.remove('visible');
  mpLobby.classList.remove('visible');
  mainScreen.classList.remove('hidden');
  gameMode = 'local';
  myRole = null;
  cleanupWebSocket();
}

function showGameScreen() {
  mainScreen.classList.add('hidden');
  mpLobby.classList.remove('visible');
  gameScreen.classList.add('visible');
}

function showMPLobby() {
  mainScreen.classList.add('hidden');
  gameScreen.classList.remove('visible');
  mpLobby.classList.add('visible');
  resetMPLobby();
}

// ═══════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════
function init() {
  board = Array.from({ length: BOARD_SIZE }, () =>
    Array.from({ length: BOARD_SIZE }, () => ({
      value: null,
      blockedDirs: [false, false, false, false],
    }))
  );
  scores = { O: 0, X: 0 };
  current = 'O';
  status = 'PLAYING';
  linesSvg.innerHTML = '';
  renderBoard();
  renderScore();
  renderTurn();
  msgEl.textContent = '';
  msgEl.className = '';
  overlayEl.classList.remove('show');
}

function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      const val = board[r][c].value;
      if (val) {
        cell.textContent = val;
        cell.classList.add(val, 'occupied');
      }
      cell.addEventListener('click', () => handleClick(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function renderScore() {
  scoreOEl.textContent = scores.O;
  scoreXEl.textContent = scores.X;
}

function renderTurn() {
  if (status !== 'PLAYING') { turnEl.innerHTML = ''; return; }
  let label = `<span class="turn-${current.toLowerCase()}">Player ${current}</span>의 턴`;
  if (gameMode !== 'local') {
    label += current === myRole ? ' (나의 턴)' : ' (대기 중)';
  }
  turnEl.innerHTML = label;
}

function drawTripleLine(cells, dirIdx, player) {
  const totalSize = boardEl.offsetWidth;
  const gap = 2;
  const cellSize = (totalSize - (BOARD_SIZE - 1) * gap) / BOARD_SIZE;
  const startOffset = cellSize / 2;
  const extend = cellSize * 0.15;
  const toPct = (px) => (px / totalSize) * 100;

  const pts = cells.map(([r, c]) => ({
    x: toPct(c * (cellSize + gap) + startOffset),
    y: toPct(r * (cellSize + gap) + startOffset)
  }));

  let x1, y1, x2, y2;
  if (dirIdx === 0) {
    y1 = y2 = pts[1].y;
    x1 = pts[0].x - toPct(extend);
    x2 = pts[2].x + toPct(extend);
  } else if (dirIdx === 1) {
    x1 = x2 = pts[1].x;
    y1 = pts[0].y - toPct(extend);
    y2 = pts[2].y + toPct(extend);
  } else {
    const dx = pts[2].x - pts[0].x;
    const dy = pts[2].y - pts[0].y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len, uy = dy / len;
    const cellExtent = toPct(cellSize / 2 + extend);
    x1 = pts[0].x - ux * cellExtent;
    y1 = pts[0].y - uy * cellExtent;
    x2 = pts[2].x + ux * cellExtent;
    y2 = pts[2].y + uy * cellExtent;
  }

  x1 = Math.max(0, Math.min(100, x1));
  y1 = Math.max(0, Math.min(100, y1));
  x2 = Math.max(0, Math.min(100, x2));
  y2 = Math.max(0, Math.min(100, y2));

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('class', `triple-line ${player} animate`);
  linesSvg.appendChild(line);
}

function handleClick(r, c) {
  if (status === 'GAME_OVER') return;

  if (board[r][c].value !== null) {
    const idx = r * BOARD_SIZE + c;
    const cell = boardEl.children[idx];
    cell.classList.remove('shake');
    void cell.offsetWidth;
    cell.classList.add('shake');
    setTimeout(() => cell.classList.remove('shake'), 250);
    return;
  }

  // multiplayer: only allow on my turn
  if (gameMode !== 'local' && !isRemoteMove && current !== myRole) {
    return;
  }

  placeMark(r, c);

  // multiplayer: send my move to peer
  if (gameMode !== 'local' && !isRemoteMove) {
    sendToPeer({ type: 'MOVE', payload: { r, c }, ts: Date.now() });
  }
}

function placeMark(r, c) {
  board[r][c].value = current;
  const idx = r * BOARD_SIZE + c;
  const cell = boardEl.children[idx];
  cell.textContent = current;
  cell.classList.add(current, 'pop', 'occupied');
  setTimeout(() => cell.classList.remove('pop'), 220);

  const triples = detectTriples(current);

  if (triples.length > 0) {
    triples.forEach(({ cells, dirIdx }) => {
      const canScore = cells.every(([tr, tc]) => !board[tr][tc].blockedDirs[dirIdx]);
      if (!canScore) return;

      cells.forEach(([tr, tc]) => {
        board[tr][tc].blockedDirs[dirIdx] = true;
      });

      scores[current] += 1;
      drawTripleLine(cells, dirIdx, current);

      cells.forEach(([tr, tc]) => {
        const ti = tr * BOARD_SIZE + tc;
        const tcEl = boardEl.children[ti];
        tcEl.classList.add('triple-hit');
        setTimeout(() => tcEl.classList.remove('triple-hit'), 700);
      });
    });

    bumpScore(current);
    renderScore();

    if (scores[current] >= WIN_SCORE) {
      endGame(current);
      return;
    }
  }

  current = current === 'O' ? 'X' : 'O';
  renderTurn();
}

function bumpScore(player) {
  const el = player === 'O' ? scoreOEl : scoreXEl;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

function detectTriples(player) {
  const found = [];
  for (let d = 0; d < 4; d++) {
    const { dr, dc } = DIRS[d];
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (board[r][c].value !== player) continue;
        const r1 = r + dr, c1 = c + dc;
        const r2 = r + 2*dr, c2 = c + 2*dc;
        if (r2 < 0 || r2 >= BOARD_SIZE || c2 < 0 || c2 >= BOARD_SIZE) continue;
        if (board[r1][c1].value !== player) continue;
        if (board[r2][c2].value !== player) continue;
        if (board[r][c].blockedDirs[d]) continue;
        if (board[r1][c1].blockedDirs[d]) continue;
        if (board[r2][c2].blockedDirs[d]) continue;
        found.push({ cells: [[r,c],[r1,c1],[r2,c2]], dirIdx: d });
      }
    }
  }
  return found;
}

function endGame(winner) {
  status = 'GAME_OVER';
  turnEl.innerHTML = '';
  msgEl.textContent = `Player ${winner} WIN!`;
  msgEl.className = winner === 'O' ? 'win-o' : 'win-x';
  winTextEl.textContent = `Player ${winner} WIN!`;
  winTextEl.className = winner.toLowerCase();
  overlayEl.classList.add('show');

  if (gameMode !== 'local') {
    sendToPeer({ type: 'GAME_OVER', payload: { winner }, ts: Date.now() });
  }
}

// ═══════════════════════════════════════
//  MULTIPLAYER — WebSocket (Server-based)
// ═══════════════════════════════════════

let wsConnectTimer = null;

function resetMPLobby() {
  mpModeSelect.style.display = 'flex';
  mpHostPanel.classList.remove('visible');
  mpGuestPanel.classList.remove('visible');
  mpHostStep.textContent = '';
  mpGuestStep.textContent = '';
  document.getElementById('mp-host-code-section').style.display = 'none';
  document.getElementById('mp-host-retry-section').style.display = 'none';
  document.getElementById('mp-guest-code-section').style.display = 'flex';
  document.getElementById('mp-guest-retry-section').style.display = 'none';
  document.getElementById('mp-guest-code-input').value = '';
  document.getElementById('mp-server-info').style.display = 'none';
  if (wsConnectTimer) { clearTimeout(wsConnectTimer); wsConnectTimer = null; }
  cleanupWebSocket();
}

// ─── WebSocket Connection ───

function connectWebSocket(onOpenCallback, customUrl) {
  cleanupWebSocket();
  if (wsConnectTimer) { clearTimeout(wsConnectTimer); wsConnectTimer = null; }

  const url = customUrl || SERVER_URL;
  console.log('[WS] Connecting to', url);

  // Show server URL in lobby
  const urlDisplay = gameMode === 'host' ? 'mp-host-url-display' : 'mp-guest-url-display';
  document.getElementById(urlDisplay).textContent = url;
  document.getElementById('mp-server-info').style.display = 'flex';
  document.getElementById('mp-server-url').textContent = url;
  document.getElementById('mp-server-dot').className = 'mp-server-dot';

  wsConnection = new WebSocket(url);
  let timedOut = false;

  // Connection timeout (5 seconds)
  wsConnectTimer = setTimeout(() => {
    timedOut = true;
    if (wsConnection && wsConnection.readyState <= 1) {
      try { wsConnection.close(); } catch(e) {}
    }
    updateMPStatus('서버 연결 시간 초과 - IP 주소가 맞는지 확인하세요', 'error');
    showRetrySection();
  }, 5000);

  wsConnection.onopen = () => {
    if (timedOut) return;
    if (wsConnectTimer) { clearTimeout(wsConnectTimer); wsConnectTimer = null; }
    console.log('[WS] Connected!');
    document.getElementById('mp-server-dot').className = 'mp-server-dot connected';
    if (onOpenCallback) onOpenCallback();
  };

  wsConnection.onclose = (ev) => {
    console.log('[WS] Disconnected (code:', ev.code, ')');
    if (wsConnectTimer) { clearTimeout(wsConnectTimer); wsConnectTimer = null; }
    if (gameMode !== 'local' && !timedOut) {
      updateMPStatus('서버 연결이 끊어졌습니다', 'error');
      showRetrySection();
    }
  };

  wsConnection.onerror = (ev) => {
    if (timedOut) return;
    console.error('[WS] Error');
    document.getElementById('mp-server-dot').className = 'mp-server-dot';
  };

  wsConnection.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleServerMessage(msg);
    } catch (e) {
      console.error('[WS] Invalid message:', ev.data);
    }
  };
}

function showRetrySection() {
  const sectionId = gameMode === 'host' ? 'mp-host-retry-section' : 'mp-guest-retry-section';
  document.getElementById(sectionId).style.display = 'flex';
}

function cleanupWebSocket() {
  if (wsConnectTimer) { clearTimeout(wsConnectTimer); wsConnectTimer = null; }
  if (wsConnection) {
    try { wsConnection.close(); } catch(e) {}
    wsConnection = null;
  }
}

// ─── Server Message Handler ───

function handleServerMessage(msg) {
  switch (msg.type) {

    case 'ROOM_CREATED': {
      mpRoomCode = msg.payload.code;
      document.getElementById('mp-host-code-section').style.display = 'flex';
      document.getElementById('mp-host-code').textContent = mpRoomCode;
      mpHostStatus.textContent = '상대방이 입장할 때까지 기다리는 중...';
      mpHostStatus.className = 'mp-status';
      mpHostStep.textContent = '위 방 코드를 친구에게 공유하세요';
      break;
    }

    case 'ROOM_JOINED': {
      mpRoomCode = msg.payload.code;
      startMultiplayerGame();
      break;
    }

    case 'PEER_JOINED': {
      mpHostStatus.textContent = '상대방이 입장했습니다! 게임을 시작합니다';
      mpHostStatus.className = 'mp-status connected';
      mpHostStep.textContent = '';
      setTimeout(() => startMultiplayerGame(), 500);
      break;
    }

    case 'PEER_DISCONNECTED': {
      updateMPStatus('상대방이 연결을 끊었습니다', 'error');
      gameMode = 'local';
      myRole = null;
      break;
    }

    case 'GAME_MESSAGE': {
      handlePeerMessage(msg.payload);
      break;
    }

    case 'ERROR': {
      updateMPStatus('오류: ' + (msg.payload || '알 수 없는 오류'), 'error');
      break;
    }
  }
}

// ─── Host Flow ───

function startAsHost() {
  gameMode = 'host';
  myRole = 'O';

  mpModeSelect.style.display = 'none';
  mpHostPanel.classList.add('visible');
  document.getElementById('mp-host-code-section').style.display = 'none';
  document.getElementById('mp-host-retry-section').style.display = 'none';
  mpHostStatus.textContent = '서버에 연결 중...';
  mpHostStep.innerHTML = '<span class="mp-server-label">서버: </span><span id="mp-host-url-display"></span>';
  mpHostStatus.className = 'mp-status';

  connectWebSocket(() => {
    mpHostStatus.textContent = '방을 생성하는 중...';
    wsConnection.send(JSON.stringify({ type: 'CREATE_ROOM' }));
  });

  // Copy button for room code
  document.getElementById('mp-host-copy-btn').onclick = () => {
    const code = document.getElementById('mp-host-code').textContent;
    navigator.clipboard.writeText(code).then(() => {
      alert('방 코드가 복사되었습니다!');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = code;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('방 코드가 복사되었습니다!');
    });
  };

  // Retry with custom URL
  document.getElementById('mp-host-retry-btn').onclick = () => {
    const customUrl = document.getElementById('mp-host-manual-url').value.trim();
    if (!customUrl) { alert('서버 주소를 입력하세요 (예: 192.168.0.2:7680)'); return; }
    const wsUrl = customUrl.startsWith('ws://') ? customUrl : `ws://${customUrl}`;
    document.getElementById('mp-host-retry-section').style.display = 'none';
    mpHostStatus.textContent = '서버에 재연결 중...';
    mpHostStatus.className = 'mp-status';
    connectWebSocket(() => {
      mpHostStatus.textContent = '방을 생성하는 중...';
      wsConnection.send(JSON.stringify({ type: 'CREATE_ROOM' }));
    }, wsUrl);
  };
}

// ─── Guest Flow ───

function startAsGuest() {
  gameMode = 'guest';
  myRole = 'X';

  mpModeSelect.style.display = 'none';
  mpGuestPanel.classList.add('visible');
  document.getElementById('mp-guest-code-section').style.display = 'flex';
  document.getElementById('mp-guest-retry-section').style.display = 'none';
  mpGuestStatus.textContent = '방 코드를 입력하세요';
  mpGuestStep.innerHTML = '<span class="mp-server-label">서버: </span><span id="mp-guest-url-display"></span>';
  mpGuestStatus.className = 'mp-status';

  // Join button
  document.getElementById('mp-guest-join-btn').onclick = () => {
    const code = document.getElementById('mp-guest-code-input').value.trim().toUpperCase();
    if (!code || code.length !== 4) {
      alert('4자리 방 코드를 입력해주세요.');
      return;
    }

    mpGuestStatus.textContent = '서버에 연결 중...';
    mpGuestStep.textContent = '잠시만 기다려주세요...';
    document.getElementById('mp-guest-code-section').style.display = 'none';

    connectWebSocket(() => {
      mpGuestStatus.textContent = '방에 입장하는 중...';
      wsConnection.send(JSON.stringify({ type: 'JOIN_ROOM', payload: { code } }));
    });
  };

  // Retry with custom URL
  document.getElementById('mp-guest-retry-btn').onclick = () => {
    const customUrl = document.getElementById('mp-guest-manual-url').value.trim();
    if (!customUrl) { alert('서버 주소를 입력하세요 (예: 192.168.0.2:7680)'); return; }
    const wsUrl = customUrl.startsWith('ws://') ? customUrl : `ws://${customUrl}`;
    document.getElementById('mp-guest-retry-section').style.display = 'none';

    const code = document.getElementById('mp-guest-code-input').value.trim().toUpperCase();
    if (code && code.length === 4) {
      mpGuestStatus.textContent = '서버에 재연결 중...';
      mpGuestStatus.className = 'mp-status';
      connectWebSocket(() => {
        mpGuestStatus.textContent = '방에 입장하는 중...';
        wsConnection.send(JSON.stringify({ type: 'JOIN_ROOM', payload: { code } }));
      }, wsUrl);
    } else {
      document.getElementById('mp-guest-code-section').style.display = 'flex';
      mpGuestStatus.textContent = '방 코드를 입력하고 다시 시도하세요';
      connectWebSocket(null, wsUrl);
    }
  };
}

// ─── Messaging ───

function sendToPeer(msg) {
  if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
    wsConnection.send(JSON.stringify({ type: 'GAME_MESSAGE', payload: msg }));
  }
}

function sendMove(r, c) {
  sendToPeer({ type: 'MOVE', payload: { r, c }, ts: Date.now() });
}

function handlePeerMessage(msg) {
  switch (msg.type) {
    case 'MOVE':
      if (gameMode !== 'local') {
        isRemoteMove = true;
        placeMark(msg.payload.r, msg.payload.c);
        isRemoteMove = false;
      }
      break;

    case 'SYNC':
      if (gameMode === 'guest') {
        board = msg.payload.board.map(row => row.map(cell => ({
          value: cell.value,
          blockedDirs: [...cell.blockedDirs]
        })));
        scores = msg.payload.scores;
        current = msg.payload.current;
        status = msg.payload.status;
        renderBoard();
        renderScore();
        renderTurn();
      }
      break;

    case 'GAME_OVER':
      if (gameMode !== 'local') {
        endGame(msg.payload.winner);
      }
      break;

    case 'RESTART_REQ':
      if (gameMode !== 'local') {
        init();
        sendToPeer({ type: 'RESTART_ACK', ts: Date.now() });
      }
      break;

    case 'RESTART_ACK':
      if (gameMode !== 'local') {
        init();
      }
      break;
  }
}

function startMultiplayerGame() {
  mpLobby.classList.remove('visible');
  showGameScreen();
  init();
}

function updateMPStatus(text, cls) {
  const el = gameMode === 'host' ? mpHostStatus : mpGuestStatus;
  if (el) {
    el.textContent = text;
    el.className = 'mp-status ' + (cls || '');
  }
}
